<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRC 8585 - Node.js & MongoDB Sync</title>
<style>
  :root { --red: #c8102e; --navy: #0d0d1a; --text: #f0f0f8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; }
  .header { background: #151528; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  .main { flex: 1; overflow-y: auto; padding: 15px; }
  .card { background: #151528; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
  input { width: 100%; padding: 12px; margin: 8px 0; background: #1e1e38; color: white; border: 1px solid #444; border-radius: 8px; outline: none; }
  .btn { width: 100%; padding: 15px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .btn:disabled { opacity: 0.5; }
  .data-item { background: #232343; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--red); }
  .tabs { display: flex; background: #151528; border-top: 1px solid #333; height: 60px; }
  .tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #5a5a7a; cursor: pointer; }
  .tab.active { color: var(--red); font-weight: bold; border-top: 2px solid var(--red); }
  .section { display: none; }
  .section.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div style="font-weight:bold;">8585 SYNC (NODE)</div>
  <div id="hdr-status" style="font-size: 11px; color: #9090b0; background: #222; padding: 4px 8px; border-radius: 4px;">連線中...</div>
</div>

<div class="main">
  <div class="section visible" id="sec-scout">
    <div class="card">
      <input type="number" id="f-match" placeholder="Match # (場次)" inputmode="numeric">
      <input type="number" id="f-team" placeholder="Team # (隊伍)" inputmode="numeric">
      <input type="text" id="f-scout" placeholder="Scouter Name (姓名)">
      <button class="btn" id="btn-submit">傳送至 Node.js 伺服器</button>
    </div>
  </div>
  <div class="section" id="sec-data">
    <div id="data-list">正在從伺服器同步數據...</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-scout">填寫</div>
  <div class="tab" id="tab-data">總覽</div>
</div>

<script>
  // 已經幫你填好你的 IP 與埠號
  const API_URL = "https://rejoice-luminance-apprehend.ngrok-free.dev/api/data";

  // 1. 從伺服器抓取資料
  async function refreshData() {
    try {
      const res = await fetch(API_URL, {
        headers: {
          'ngrok-skip-browser-warning': 'true'
      }
    });
      if (!res.ok) throw new Error("伺服器回應錯誤");
      const data = await res.json();
      
      const list = document.getElementById('data-list');
      document.getElementById('hdr-status').textContent = `雲端數據: ${data.length} 筆`;
      
      if (data.length === 0) {
        list.innerHTML = "<div style='text-align:center; padding:20px;'>MongoDB 目前沒有資料</div>";
        return;
      }

      list.innerHTML = data.map(d => `
        <div class="data-item">
          <strong>Team ${d.team}</strong> (Match ${d.match})<br>
          <small style="color:#aaa;">Scout: ${d.scout} @ ${new Date(d.ts).toLocaleTimeString()}</small>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('hdr-status').textContent = "伺服器連線失敗";
      console.error(e);
    }
  }

  // 2. 傳送資料到伺服器
  document.getElementById('btn-submit').onclick = async function() {
    const m = document.getElementById('f-match').value;
    const t = document.getElementById('f-team').value;
    const s = document.getElementById('f-scout').value || '匿名';

    if(!m || !t) return alert("請填寫場次與隊伍");

    const btn = this;
    btn.disabled = true;
    btn.textContent = "傳送中...";

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          match: Number(m),
          team: Number(t),
          scout: s,
          ts: Date.now()
        })
      });

      if (response.ok) {
        alert("✅ 成功同步至 MongoDB！");
        document.getElementById('f-match').value = "";
        document.getElementById('f-team').value = "";
        refreshData(); // 成功後立即刷新列表
      } else {
        alert("❌ 伺服器儲存失敗");
      }
    } catch (e) {
      alert("❌ 無法連線到 Node.js 伺服器，請確認電腦端 node server.js 是否有在跑");
    } finally {
      btn.disabled = false;
      btn.textContent = "傳送至 Node.js 伺服器";
    }
  };

  // 分頁切換邏輯
  const sections = ['scout', 'data'];
  function switchTab(target) {
    sections.forEach(s => {
      document.getElementById(`sec-${s}`).className = s === target ? 'section visible' : 'section';
      document.getElementById(`tab-${s}`).className = s === target ? 'tab active' : 'tab';
    });
    if (target === 'data') refreshData();
  }

  document.getElementById('tab-scout').onclick = () => switchTab('scout');
  document.getElementById('tab-data').onclick = () => switchTab('data');

  // 每 5 秒自動重新抓取
  setInterval(refreshData, 5000);
  refreshData();
</script>
</body>
</html>
