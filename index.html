<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRC 8585 - Multi-Device Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --red: #c8102e; --navy: #0d0d1a; --navy2: #151528; --text: #f0f0f8; --border: rgba(255,255,255,0.1); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--text); font-family: 'Barlow', sans-serif; height: 100dvh; display: flex; flex-direction: column; }
  .header { background: var(--navy2); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .main { flex: 1; overflow-y: auto; padding: 15px; }
  .card { background: var(--navy2); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
  input { width: 100%; padding: 12px; background: #1e1e38; color: white; border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; }
  .btn { width: 100%; padding: 15px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .data-item { background: #232343; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--red); text-align: left; }
  .tabs { display: flex; background: var(--navy2); border-top: 1px solid var(--border); }
  .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #5a5a7a; }
  .tab.active { color: var(--red); font-weight: bold; }
  .section { display: none; }
  .section.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div style="font-weight:bold;">FRC 8585 CLOUD</div>
  <div id="hdr-count" style="font-size: 12px; color: #9090b0;">同步中...</div>
</div>

<div class="main">
  <div class="section visible" id="sec-scout">
    <div class="card">
      <input type="number" id="f-match" placeholder="場次 Match #" inputmode="numeric">
      <input type="number" id="f-team" placeholder="隊伍 Team #" inputmode="numeric">
      <input type="text" id="f-scout" placeholder="Scouter 姓名">
      <button class="btn" id="btn-submit">儲存並共享資料</button>
    </div>
  </div>

  <div class="section" id="sec-data">
    <div id="data-list">正在從雲端捉取最新數據...</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-scout">📝 填寫</div>
  <div class="tab" id="tab-data">📦 數據總覽</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { initializeFirestore, collection, addDoc, onSnapshot, query, orderBy, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAiBIbo-NFFl8dsZh4_vtAg1HvHbxU3Tis",
    authDomain: "frc8585-scout.firebaseapp.com",
    projectId: "frc8585-scout",
    storageBucket: "frc8585-scout.firebasestorage.app",
    messagingSenderId: "580552304105",
    appId: "1:580552304105:web:37960d2ca6b9246e2d5778"
  };

  const app = initializeApp(firebaseConfig);
  const db = initializeFirestore(app, { experimentalForceLongPolling: true });

  // 啟用離線快取，確保網路不穩也能存
  enableIndexedDbPersistence(db).catch(() => {});

  const scoutCol = collection(db, "match_results");

  // 【核心：即時共享監聽】
  // 當任何一台手機上傳資料，所有人的畫面都會被這個函數觸發更新
  onSnapshot(query(scoutCol, orderBy("ts", "desc")), (snap) => {
    document.getElementById('hdr-count').textContent = `雲端共 ${snap.size} 筆`;
    const list = document.getElementById('data-list');
    
    if (snap.empty) {
      list.innerHTML = "目前尚無資料，請開始填寫。";
      return;
    }

    list.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `<div class="data-item">
        <strong>Match ${d.match} - Team ${d.team}</strong><br>
        <small style="color:#aaa;">Scout: ${d.scout} | 建立時間: ${new Date(d.ts).toLocaleTimeString()}</small>
      </div>`;
    }).join('');
  }, (err) => {
    console.error("讀取失敗：", err);
    document.getElementById('data-list').innerHTML = "讀取權限不足，請檢查 Firebase Rules";
  });

  // 上傳邏輯
  document.getElementById('btn-submit').onclick = function() {
    const m = document.getElementById('f-match').value;
    const t = document.getElementById('f-team').value;
    if(!m || !t) return alert("請填寫必填欄位");

    this.disabled = true;
    this.textContent = "發送至雲端...";

    addDoc(scoutCol, {
      match: Number(m),
      team: Number(t),
      scout: document.getElementById('f-scout').value || '匿名',
      ts: Date.now()
    });

    setTimeout(() => {
      alert("✅ 資料已同步至雲端");
      document.getElementById('f-match').value = "";
      document.getElementById('f-team').value = "";
      this.disabled = false;
      this.textContent = "儲存並共享資料";
    }, 500);
  };

  // 簡易分頁切換
  document.getElementById('tab-scout').onclick = () => {
    document.getElementById('sec-scout').className = 'section visible';
    document.getElementById('sec-data').className = 'section';
    document.getElementById('tab-scout').className = 'tab active';
    document.getElementById('tab-data').className = 'tab';
  };
  document.getElementById('tab-data').onclick = () => {
    document.getElementById('sec-scout').className = 'section';
    document.getElementById('sec-data').className = 'section visible';
    document.getElementById('tab-scout').className = 'tab';
    document.getElementById('tab-data').className = 'tab active';
  };
</script>
</body>
</html>
